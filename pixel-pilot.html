<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>PIXEL PILOT – Nico's Arcade Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000341;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Silkscreen', cursive;
      background-image:
        linear-gradient(to right, rgba(112,240,243,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(112,240,243,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    #wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
    }

    #topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 640px;
      max-width: 95vw;
      padding: 6px 2px 6px;
    }

    .hud-label { color: #9da5f7; font-size: 9px; letter-spacing: 2px; }
    .hud-val   { color: #70f0f3; font-size: 15px; letter-spacing: 2px; text-shadow: 0 0 10px #70f0f3; }
    .hud-center{ text-align: center; }
    .hud-right { text-align: right; }

    #lives-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      padding-bottom: 2px;
    }

    canvas {
      display: block;
      border: 1px solid rgba(112,240,243,0.25);
      box-shadow:
        0 0 30px rgba(112,240,243,0.15),
        0 0 60px rgba(112,240,243,0.08),
        inset 0 0 30px rgba(0,3,65,0.5);
      width: 640px;
      max-width: 95vw;
      aspect-ratio: 4 / 5;
      image-rendering: pixelated;
    }

    /* Touch controls */
    #touch-controls {
      display: none;
      justify-content: space-between;
      width: 640px;
      max-width: 95vw;
      padding: 10px 0;
      gap: 8px;
    }

    @media (pointer: coarse), (max-width: 520px) {
      #touch-controls { display: flex; }
    }

    .tch {
      flex: 1;
      padding: 18px 0;
      background: rgba(112,240,243,0.07);
      border: 2px solid rgba(112,240,243,0.3);
      color: #70f0f3;
      font-family: 'Silkscreen', cursive;
      font-size: 18px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      transition: background 0.1s, box-shadow 0.1s;
    }
    .tch:active, .tch.on {
      background: rgba(112,240,243,0.25);
      box-shadow: 0 0 14px rgba(112,240,243,0.5);
    }
    .tch-fire {
      background: rgba(215,126,255,0.07);
      border-color: rgba(215,126,255,0.3);
      color: #d77eff;
    }
    .tch-fire:active, .tch-fire.on {
      background: rgba(215,126,255,0.25);
      box-shadow: 0 0 14px rgba(215,126,255,0.5);
    }

    #back-btn {
      position: fixed;
      top: 14px; left: 14px;
      background: rgba(0,3,65,0.85);
      border: 1px solid rgba(112,240,243,0.3);
      color: #70f0f3;
      font-family: 'Silkscreen', cursive;
      font-size: 9px;
      padding: 7px 12px;
      cursor: pointer;
      letter-spacing: 2px;
      text-decoration: none;
      z-index: 100;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #back-btn:hover {
      border-color: #70f0f3;
      box-shadow: 0 0 10px rgba(112,240,243,0.35);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* name entry overlay */
    #neo { display:none; position:fixed; inset:0; background:rgba(0,3,65,.94);
      z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
    #neo.show { display:flex; }
    .nt { font-size:14px; color:#70f0f3; text-shadow:0 0 12px #70f0f3; letter-spacing:2px; }
    .ns { font-size:10px; color:#d77eff; letter-spacing:2px; }
    #neo-inp { background:rgba(0,3,65,.8); border:2px solid #70f0f3; color:#70f0f3;
      font-family:'Silkscreen',cursive; font-size:16px; letter-spacing:2px;
      padding:10px 16px; text-align:center; outline:none; width:260px;
      text-transform:uppercase; }
    #neo-inp::placeholder { color:#39408c; }
    #neo-btn { background:transparent; border:2px solid #d77eff; color:#d77eff;
      font-family:'Silkscreen',cursive; font-size:10px; letter-spacing:2px;
      padding:8px 28px; cursor:pointer; text-transform:uppercase; }
    #neo-btn:hover { background:rgba(215,126,255,.15); }
  </style>
</head>
<body>

<a href="index.html" id="back-btn" aria-label="Back to Nico's Arcade Room">← BACK</a>

<div id="wrapper">
  <div id="topbar">
    <div>
      <div class="hud-label">SCORE</div>
      <div class="hud-val" id="hud-score">00000</div>
    </div>
    <div class="hud-center">
      <div class="hud-label" style="color:#d77eff;font-size:11px;letter-spacing:3px">PIXEL PILOT</div>
      <div class="hud-label" id="hud-level" style="margin-top:2px">SECTOR 1</div>
    </div>
    <div class="hud-right">
      <div class="hud-label">HI-SCORE</div>
      <div class="hud-val" id="hud-hi">00000</div>
    </div>
  </div>

  <canvas id="gc" width="480" height="600" aria-label="Pixel Pilot game canvas"></canvas>

  <div id="touch-controls">
    <div class="tch" id="tc-left"  aria-label="Move left">◀</div>
    <div class="tch tch-fire" id="tc-fire" aria-label="Fire">FIRE</div>
    <div class="tch" id="tc-right" aria-label="Move right">▶</div>
  </div>
</div>

<div id="neo">
  <div class="nt">★ TOP 10 ★</div>
  <div class="ns">ENTER YOUR NAME</div>
  <div style="font-size:9px;color:#9da5f7;letter-spacing:2px" id="ne-sc"></div>
  <input id="neo-inp" type="text" maxlength="15" autocomplete="off" spellcheck="false" placeholder="ENTER NAME...">
  <button id="neo-btn">CONFIRM ✓</button>
</div>

<script>
(function () {
'use strict';

// ── Canvas setup ─────────────────────────────────────────────────────────────
const cv  = document.getElementById('gc');
const ctx = cv.getContext('2d');
const W   = cv.width;   // 480
const H   = cv.height;  // 600

// Scale canvas for high-DPI but keep logical 480×600
(function scaleDPI() {
  const dpr = window.devicePixelRatio || 1;
  if (dpr <= 1) return;
  const cw = cv.width, ch = cv.height;
  cv.width  = cw * dpr;
  cv.height = ch * dpr;
  ctx.scale(dpr, dpr);
})();

// ── State machine ─────────────────────────────────────────────────────────────
const ST = { TITLE: 0, PLAYING: 1, PAUSED: 2, LEVEL_CLEAR: 3, GAME_OVER: 4, NAME_ENTRY: 5 };
let st = ST.TITLE;

// ── Persistent data ──────────────────────────────────────────────────────────
let score = 0, lives = 3, level = 1;
let hiScore = parseInt(localStorage.getItem('pp_hi') || '0');

// ── Leaderboard (Supabase) ────────────────────────────────────────────────────
const SB_URL = 'https://eqagokpvhmobxqnyixqu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxYWdva3B2aG1vYnhxbnlpeHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTExOTQsImV4cCI6MjA5MTkyNzE5NH0.MNVg8h3Xc3m3kip3vRofYK_FoDX-WAm9zibzF0Wb-Oo';
function lbIsTop(s) { return s > 0; }
function lbInsert(name, s) {
  fetch(SB_URL + '/rest/v1/scores', {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ player_name: name.toUpperCase(), game: 'pixel-pilot', score: s })
  }).catch(() => {});
}

// ── Name entry state ─────────────────────────────────────────────────────────
function neShow() {
  document.getElementById('neo-inp').value = '';
  document.getElementById('ne-sc').textContent = 'SCORE: ' + score.toString().padStart(5,'0');
  document.getElementById('neo').classList.add('show');
  st = ST.NAME_ENTRY;
  setTimeout(() => document.getElementById('neo-inp').focus(), 50);
}
function neSubmit() {
  const name = (document.getElementById('neo-inp').value.trim().slice(0,15) || '???').toUpperCase();
  lbInsert(name, score);
  document.getElementById('neo').classList.remove('show');
  st = ST.GAME_OVER;
  sfxGameOver();
}
document.getElementById('neo-btn').addEventListener('click', neSubmit);
document.getElementById('neo-inp').addEventListener('keydown', e => { if (e.code === 'Enter') { e.preventDefault(); neSubmit(); } });

// ── Web Audio (arcade beeps) ─────────────────────────────────────────────────
let _ac = null;
function ac() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}
function beep(freq, dur, type = 'square', vol = 0.18) {
  try {
    const a = ac(), o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, a.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq * 0.4, a.currentTime + dur);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  } catch(_) {}
}
function sfxShoot()    { beep(880, 0.06, 'square', 0.12); }
function sfxEnemyShoot(){ beep(200, 0.12, 'sawtooth', 0.1); }
function sfxExplode()  {
  try {
    const a = ac();
    const n = a.sampleRate * 0.14;
    const buf = a.createBuffer(1, n, a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 1.5);
    const src = a.createBufferSource(), g = a.createGain();
    src.buffer = buf; src.connect(g); g.connect(a.destination);
    g.gain.setValueAtTime(0.5, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 0.14);
    src.start();
  } catch(_) {}
}
function sfxLevelUp()  { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'square', 0.15), i * 80)); }
function sfxGameOver() { [440, 392, 349, 262].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'sawtooth', 0.18), i * 120)); }
function sfxPowerup()  { beep(1047, 0.25, 'triangle', 0.2); }

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowLeft' || e.code === 'ArrowRight') e.preventDefault();
  if (st === ST.NAME_ENTRY) return;

  if (e.code === 'KeyP') {
    if (st === ST.PLAYING) st = ST.PAUSED;
    else if (st === ST.PAUSED) st = ST.PLAYING;
  }
  if ((e.code === 'Enter' || e.code === 'Space') && st === ST.TITLE) startGame();
  if ((e.code === 'Enter' || e.code === 'Space') && st === ST.GAME_OVER) st = ST.TITLE;
  if ((e.code === 'Enter' || e.code === 'Space') && st === ST.LEVEL_CLEAR) nextLevel();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch
const T = { left: false, right: false, fire: false, fireEdge: false };
function bindTch(el, key) {
  el.addEventListener('touchstart', e => {
    e.preventDefault(); T[key] = true; el.classList.add('on');
    if (key === 'fire') T.fireEdge = true;
    if (_ac) _ac.resume();
    if (st === ST.NAME_ENTRY) return;
    // state transitions on fire tap
    if (st === ST.TITLE)      startGame();
    if (st === ST.GAME_OVER)  st = ST.TITLE;
    if (st === ST.LEVEL_CLEAR) nextLevel();
  }, { passive: false });
  el.addEventListener('touchend',    e => { e.preventDefault(); T[key] = false; el.classList.remove('on'); }, { passive: false });
  el.addEventListener('touchcancel', () => { T[key] = false; el.classList.remove('on'); });
}
bindTch(document.getElementById('tc-left'),  'left');
bindTch(document.getElementById('tc-right'), 'right');
bindTch(document.getElementById('tc-fire'),  'fire');

// Unlock AudioContext on any user gesture
document.addEventListener('keydown', () => { if (_ac) _ac.resume(); }, { once: true });

// ── Stars ──────────────────────────────────────────────────────────────────────
const stars = Array.from({ length: 90 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.4 + 0.3,
  spd: Math.random() * 35 + 10,
  b: Math.random() * Math.PI * 2,
}));

// ── Player ─────────────────────────────────────────────────────────────────────
const PL = {
  x: W / 2, y: H - 68,
  w: 38, h: 22,
  spd: 290,
  bullets: [],
  cd: 0,           // shoot cooldown
  inv: 0,          // invincibility timer
  hasShield: false,
};

// ── Enemy config ───────────────────────────────────────────────────────────────
const COLS = 10, ROWS = 4;
const EW = 28, EH = 22, EGAPX = 14, EGAPY = 14;
const GRID_W = COLS * EW + (COLS - 1) * EGAPX;  // 10*28 + 9*14 = 406

const ROW_CFG = [
  { col: '#d77eff', pts: 30, type: 'diamond' },
  { col: '#b8a0fb', pts: 20, type: 'cross'   },
  { col: '#aa92ec', pts: 20, type: 'cross'   },
  { col: '#9da5f7', pts: 10, type: 'block'   },
];

let enemies = [], eBullets = [], particles = [], powerups = [];
let eDir = 1;              // 1=right, -1=left
let eBaseSpd, eCurSpd;
let eShootTimer = 0, eShootInt;
let eDrop = false;         // currently dropping?

// ── Level init ─────────────────────────────────────────────────────────────────
function startGame() {
  if (_ac) _ac.resume();
  score = 0; lives = 3; level = 1;
  st = ST.PLAYING;
  initLevel();
}

function initLevel() {
  PL.x = W / 2;
  PL.bullets = []; PL.cd = 0; PL.inv = 0; PL.hasShield = false;
  eBullets = []; particles = []; powerups = [];
  eDir = 1; eDrop = false;
  eBaseSpd = 28 + (level - 1) * 9;
  eCurSpd  = eBaseSpd;
  eShootInt = Math.max(0.45, 1.3 - (level - 1) * 0.1);
  eShootTimer = eShootInt;

  enemies = [];
  const ox = (W - GRID_W) / 2;
  const oy = 72;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      enemies.push({
        x: ox + c * (EW + EGAPX),
        y: oy + r * (EH + EGAPY),
        targetY: oy + r * (EH + EGAPY),
        r, c, alive: true, frame: 0, ft: 0,
      });
    }
  }
  updateHUD();
}

function nextLevel() { level++; st = ST.PLAYING; initLevel(); }

// ── Game loop ──────────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function update(dt) {
  // Stars always scroll
  stars.forEach(s => { s.y += s.spd * dt; if (s.y > H + 2) { s.y = -2; s.x = Math.random() * W; } });

  if (st !== ST.PLAYING) return;

  // ── Player movement ──────────────────────────────────────────────────────
  const goL = keys['ArrowLeft']  || keys['KeyA'] || T.left;
  const goR = keys['ArrowRight'] || keys['KeyD'] || T.right;
  const fire = keys['Space']     || keys['KeyZ'] || T.fire;

  if (goL) PL.x = Math.max(PL.w / 2 + 2, PL.x - PL.spd * dt);
  if (goR) PL.x = Math.min(W - PL.w / 2 - 2, PL.x + PL.spd * dt);

  // Player shoot
  PL.cd -= dt;
  if (fire && PL.cd <= 0) {
    PL.bullets.push({ x: PL.x, y: PL.y - PL.h / 2 - 2 });
    PL.cd = 0.21;
    sfxShoot();
  }

  PL.inv = Math.max(0, PL.inv - dt);

  // Player bullets move
  PL.bullets.forEach(b => b.y -= 530 * dt);
  PL.bullets = PL.bullets.filter(b => b.y > -10);

  // ── Enemy logic ───────────────────────────────────────────────────────────
  const alive = enemies.filter(e => e.alive);
  if (alive.length === 0) {
    st = ST.LEVEL_CLEAR;
    sfxLevelUp();
    return;
  }

  // Speed scales up as enemies die
  const frac = alive.length / (COLS * ROWS);
  eCurSpd = eBaseSpd / Math.max(0.15, frac);

  // Animate frames
  alive.forEach(e => {
    e.ft += dt;
    if (e.ft >= 0.45) { e.frame ^= 1; e.ft = 0; }
  });

  if (!eDrop) {
    // Horizontal movement
    alive.forEach(e => e.x += eDir * eCurSpd * dt);

    // Edge detect
    const minX = Math.min(...alive.map(e => e.x));
    const maxX = Math.max(...alive.map(e => e.x + EW));
    if (maxX >= W - 2 || minX <= 2) {
      eDir *= -1;
      // Set drop targets
      alive.forEach(e => e.targetY = e.y + 22);
      eDrop = true;
    }
  } else {
    // Drop down toward targetY
    alive.forEach(e => {
      e.y = Math.min(e.y + 100 * dt, e.targetY);
    });
    if (alive.every(e => e.y >= e.targetY)) eDrop = false;
  }

  // Enemy shoot
  eShootTimer -= dt;
  if (eShootTimer <= 0) {
    eShootTimer = eShootInt * (0.6 + Math.random() * 0.8);
    const liveCols = [...new Set(alive.map(e => e.c))];
    if (liveCols.length) {
      const col = liveCols[Math.floor(Math.random() * liveCols.length)];
      const shooters = alive.filter(e => e.c === col).sort((a, b) => b.y - a.y);
      if (shooters.length) {
        const sh = shooters[0];
        eBullets.push({ x: sh.x + EW / 2, y: sh.y + EH });
        sfxEnemyShoot();
      }
    }
  }

  // Enemy bullets move
  eBullets.forEach(b => b.y += 210 * dt);
  eBullets = eBullets.filter(b => b.y < H + 10);

  // ── Collisions ────────────────────────────────────────────────────────────
  // Player bullets vs enemies
  outer: for (let bi = PL.bullets.length - 1; bi >= 0; bi--) {
    const b = PL.bullets[bi];
    for (let ei = 0; ei < enemies.length; ei++) {
      const e = enemies[ei];
      if (!e.alive) continue;
      if (b.x >= e.x && b.x <= e.x + EW && b.y >= e.y && b.y <= e.y + EH) {
        e.alive = false;
        PL.bullets.splice(bi, 1);
        const pts = ROW_CFG[e.r].pts * level;
        score += pts;
        if (score > hiScore) { hiScore = score; localStorage.setItem('pp_hi', hiScore); }
        boom(e.x + EW / 2, e.y + EH / 2, ROW_CFG[e.r].col, 14);
        sfxExplode();
        // Spawn points popup
        particles.push({ kind: 'text', x: e.x + EW / 2, y: e.y, txt: '+' + pts, col: ROW_CFG[e.r].col, life: 0.8, vy: -55 });
        // Powerup drop chance
        if (Math.random() < 0.07) {
          powerups.push({ x: e.x + EW / 2, y: e.y + EH / 2, type: 'shield', vy: 75, life: 6 });
        }
        updateHUD();
        continue outer;
      }
    }
  }

  // Enemy bullets vs player
  if (PL.inv <= 0) {
    for (let bi = eBullets.length - 1; bi >= 0; bi--) {
      const b = eBullets[bi];
      if (b.x >= PL.x - PL.w / 2 && b.x <= PL.x + PL.w / 2 &&
          b.y >= PL.y - PL.h / 2 && b.y <= PL.y + PL.h / 2) {
        eBullets.splice(bi, 1);
        if (PL.hasShield) {
          PL.hasShield = false;
          PL.inv = 1.5;
          boom(PL.x, PL.y, '#70f0f3', 10);
        } else {
          hitPlayer();
        }
      }
    }
  }

  // Enemy reaches bottom line
  if (alive.some(e => e.y + EH >= PL.y - 20)) { lives = 0; doGameOver(); }

  // Powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y  += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0 || p.y > H) { powerups.splice(i, 1); continue; }
    // Pickup
    if (Math.abs(p.x - PL.x) < PL.w / 2 + 8 && Math.abs(p.y - PL.y) < PL.h / 2 + 8) {
      PL.hasShield = true;
      boom(p.x, p.y, '#70f0f3', 8);
      sfxPowerup();
      powerups.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    if (p.kind === 'text') { p.y += p.vy * dt; continue; }
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
    p.vy += 80 * dt;
    p.r   = Math.max(0, p.r - p.decay * dt);
  }
}

function hitPlayer() {
  lives--;
  boom(PL.x, PL.y, '#70f0f3', 18);
  sfxExplode();
  PL.inv = 2.5;
  updateHUD();
  if (lives <= 0) doGameOver();
}

function doGameOver() {
  if (score > hiScore) { hiScore = score; localStorage.setItem('pp_hi', hiScore); }
  updateHUD();
  if (lbIsTop(score)) {
    neShow();
  } else {
    st = ST.GAME_OVER;
    sfxGameOver();
  }
}

function boom(x, y, col, count) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 * i / count) + Math.random() * 0.4;
    const spd = 50 + Math.random() * 110;
    particles.push({
      kind: 'dot',
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 30,
      r: 1.5 + Math.random() * 2.5,
      decay: 3 + Math.random() * 4,
      col,
      life: 0.35 + Math.random() * 0.35,
    });
  }
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score.toString().padStart(5, '0');
  document.getElementById('hud-hi').textContent    = hiScore.toString().padStart(5, '0');
  document.getElementById('hud-level').textContent = `SECTOR ${level}`;
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#000341';
  ctx.fillRect(0, 0, W, H);

  // Pixel grid
  ctx.strokeStyle = 'rgba(112,240,243,0.035)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Stars
  const now = Date.now() * 0.001;
  stars.forEach(s => {
    const a = 0.35 + 0.35 * Math.sin(now * 1.2 + s.b);
    ctx.fillStyle = `rgba(157,165,247,${a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  if (st === ST.TITLE)       { drawTitle(now); return; }
  if (st === ST.PAUSED)      { drawField(); drawOverlay('PAUSED', '#70f0f3', 'PRESS P TO RESUME'); return; }
  if (st === ST.LEVEL_CLEAR) { drawField(); drawLevelClear(now); return; }
  if (st === ST.GAME_OVER)   { drawField(); drawGameOver(now); return; }
  if (st === ST.NAME_ENTRY)  { drawField(); return; }

  drawField();
}

function drawField() {
  // Ground line
  ctx.strokeStyle = 'rgba(112,240,243,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H - 36);
  ctx.lineTo(W, H - 36);
  ctx.stroke();

  // Enemy bullets
  eBullets.forEach(b => {
    ctx.save();
    ctx.shadowBlur = 8; ctx.shadowColor = '#ff6e84';
    ctx.fillStyle = '#ff6e84';
    ctx.fillRect(b.x - 2, b.y - 7, 4, 13);
    ctx.restore();
  });

  // Player bullets
  PL.bullets.forEach(b => {
    ctx.save();
    ctx.shadowBlur = 14; ctx.shadowColor = '#70f0f3';
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x - 2, b.y - 9, 4, 18);
    ctx.restore();
  });

  // Powerups
  powerups.forEach(p => {
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.005);
    ctx.save();
    ctx.shadowBlur = 14 * pulse; ctx.shadowColor = '#70f0f3';
    ctx.strokeStyle = '#70f0f3'; ctx.lineWidth = 2;
    ctx.strokeRect(p.x - 10, p.y - 10, 20, 20);
    ctx.fillStyle = '#70f0f3';
    ctx.font = '9px Silkscreen';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('S', p.x, p.y);
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    const cfg = ROW_CFG[e.r];
    drawEnemy(e.x, e.y, EW, EH, cfg.col, cfg.type, e.frame);
  });

  // Player (blink when invincible)
  const show = PL.inv <= 0 || Math.floor(PL.inv * 9) % 2 === 0;
  if (show) drawShip(PL.x, PL.y);

  // Shield ring
  if (PL.hasShield) {
    const a = 0.5 + 0.3 * Math.sin(Date.now() * 0.004);
    ctx.save();
    ctx.shadowBlur = 20; ctx.shadowColor = '#70f0f3';
    ctx.strokeStyle = `rgba(112,240,243,${a})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(PL.x, PL.y, 28, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // Particles
  ctx.save();
  particles.forEach(p => {
    if (p.kind === 'text') {
      const alpha = Math.min(1, p.life * 2);
      ctx.shadowBlur = 6; ctx.shadowColor = p.col;
      ctx.fillStyle = p.col;
      ctx.globalAlpha = alpha;
      ctx.font = '9px Silkscreen';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.txt, p.x, p.y);
    } else {
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 2.5));
      ctx.shadowBlur = 8; ctx.shadowColor = p.col;
      ctx.fillStyle = p.col;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  ctx.restore();

  // Lives mini-ships
  for (let i = 0; i < Math.min(lives, 5); i++) {
    drawMini(16 + i * 28, H - 20);
  }
}

// ── Ship drawings ─────────────────────────────────────────────────────────────
function drawShip(x, y) {
  ctx.save();
  ctx.shadowBlur = 18; ctx.shadowColor = '#70f0f3';
  ctx.fillStyle = '#70f0f3';

  // Body
  ctx.beginPath();
  ctx.moveTo(x, y - 19);
  ctx.lineTo(x + 15, y + 8);
  ctx.lineTo(x + 9,  y + 4);
  ctx.lineTo(x + 7,  y + 11);
  ctx.lineTo(x,      y + 7);
  ctx.lineTo(x - 7,  y + 11);
  ctx.lineTo(x - 9,  y + 4);
  ctx.lineTo(x - 15, y + 8);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#002829';
  ctx.beginPath();
  ctx.arc(x, y - 5, 5, 0, Math.PI * 2);
  ctx.fill();

  // Engine exhaust flicker
  const t = Date.now() * 0.007;
  ctx.shadowColor = '#d77eff';
  ctx.fillStyle = `rgba(215,126,255,${0.65 + 0.35 * Math.sin(t * 11)})`;
  ctx.fillRect(x - 5, y + 7, 10, 4 + Math.floor(Math.random() * 5));

  ctx.restore();
}

function drawMini(x, y) {
  ctx.save();
  ctx.shadowBlur = 8; ctx.shadowColor = '#70f0f3';
  ctx.fillStyle = '#70f0f3';
  ctx.beginPath();
  ctx.moveTo(x,     y - 8);
  ctx.lineTo(x + 7, y + 4);
  ctx.lineTo(x - 7, y + 4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ── Enemy drawings ─────────────────────────────────────────────────────────────
function drawEnemy(x, y, w, h, col, type, frame) {
  ctx.save();
  ctx.shadowBlur = 10; ctx.shadowColor = col;
  ctx.fillStyle  = col;
  const cx = x + w / 2, cy = y + h / 2;
  const off = frame ? 2 : 0;

  if (type === 'diamond') {
    // Diamond body
    ctx.beginPath();
    ctx.moveTo(cx,     y + off);
    ctx.lineTo(x + w,  cy);
    ctx.lineTo(cx,     y + h - off);
    ctx.lineTo(x,      cy);
    ctx.closePath();
    ctx.fill();
    // Side spikes
    ctx.fillRect(x - 3,      cy - 2, 5, 4);
    ctx.fillRect(x + w - 2,  cy - 2, 5, 4);
    // Eyes
    ctx.fillStyle = '#000341';
    ctx.beginPath(); ctx.arc(cx - 5, cy - 1, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 5, cy - 1, 3, 0, Math.PI * 2); ctx.fill();

  } else if (type === 'cross') {
    const t = 5;
    ctx.fillRect(cx - t,  y + off,      t * 2, h - off * 2);
    ctx.fillRect(x,       cy - t,       w,      t * 2);
    // Animated tentacles
    ctx.fillRect(x + 2,       y + h - off, 4, 4 + off);
    ctx.fillRect(cx - 2,      y + h,       4, 3 - off);
    ctx.fillRect(x + w - 6,   y + h - off, 4, 4 + off);
    // Eyes
    ctx.fillStyle = '#000341';
    ctx.beginPath(); ctx.arc(cx - 5, cy, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 5, cy, 2.5, 0, Math.PI * 2); ctx.fill();

  } else { // block
    // Body
    ctx.fillRect(x + 2, y + off, w - 4, h - off * 2 - 2);
    // Antenna
    ctx.fillRect(cx - 1, y, 2, 5 - off);
    ctx.fillRect(cx - 5, y + 1, 4, 2);
    ctx.fillRect(cx + 1, y + 1, 4, 2);
    // Mouth
    ctx.fillRect(cx - 6, cy + 3, 3, 3);
    ctx.fillRect(cx - 1, cy + 3, 2, 3);
    ctx.fillRect(cx + 3, cy + 3, 3, 3);
    // Eyes
    ctx.fillStyle = '#000341';
    ctx.fillRect(cx - 7, cy - 2, 5, 4);
    ctx.fillRect(cx + 2, cy - 2, 5, 4);
    // Legs (animated)
    ctx.fillStyle = col;
    if (frame) {
      ctx.fillRect(x + 2,      y + h - 2, 4, 4);
      ctx.fillRect(x + w - 6,  y + h - 2, 4, 4);
    } else {
      ctx.fillRect(x + 8,      y + h - 2, 4, 4);
      ctx.fillRect(x + w - 12, y + h - 2, 4, 4);
    }
  }

  ctx.restore();
}

// ── Screen overlays ───────────────────────────────────────────────────────────
function drawTitle(t) {
  // Scanline overlay
  for (let y = 0; y < H; y += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, y, W, 2);
  }

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Logo glow pulse
  const pulse = 0.85 + 0.15 * Math.sin(t * 1.8);
  ctx.save();
  ctx.shadowBlur = 30 * pulse; ctx.shadowColor = '#70f0f3';
  ctx.fillStyle = '#70f0f3';
  ctx.font = '34px Silkscreen';
  ctx.fillText('PIXEL PILOT', W / 2, 140);
  ctx.restore();

  ctx.save();
  ctx.shadowBlur = 12; ctx.shadowColor = '#d77eff';
  ctx.fillStyle = '#d77eff';
  ctx.font = '11px Silkscreen';
  ctx.fillText('NICO\'S ARCADE ROOM', W / 2, 170);
  ctx.restore();

  // Score table
  const tableEntries = [
    { type: 'diamond', col: '#d77eff', label: '= 30 × LEVEL' },
    { type: 'cross',   col: '#b8a0fb', label: '= 20 × LEVEL' },
    { type: 'block',   col: '#9da5f7', label: '= 10 × LEVEL' },
    { type: 'shield',  col: '#70f0f3', label: '= SHIELD'     },
  ];

  tableEntries.forEach((e, i) => {
    const ey = 230 + i * 48;
    if (e.type === 'shield') {
      ctx.save();
      ctx.shadowBlur = 12; ctx.shadowColor = '#70f0f3';
      ctx.strokeStyle = '#70f0f3'; ctx.lineWidth = 2;
      ctx.strokeRect(W / 2 - 80, ey - 11, 20, 20);
      ctx.fillStyle = '#70f0f3';
      ctx.font = '9px Silkscreen';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('S', W / 2 - 70, ey);
      ctx.restore();
    } else {
      drawEnemy(W / 2 - 90, ey - 11, EW, EH, e.col, e.type, Math.floor(t * 2) % 2);
    }
    ctx.save();
    ctx.shadowBlur = 6; ctx.shadowColor = e.col;
    ctx.fillStyle  = e.col;
    ctx.font = '9px Silkscreen';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(e.label, W / 2 - 52, ey);
    ctx.restore();
  });

  // Blink prompt
  if (Math.floor(t * 1.8) % 2 === 0) {
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = '#70f0f3';
    ctx.fillStyle = '#70f0f3';
    ctx.font = '10px Silkscreen';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('PRESS SPACE / FIRE TO START', W / 2, H - 72);
    ctx.restore();
  }

  // Controls hint
  ctx.fillStyle = '#39408c';
  ctx.font = '8px Silkscreen';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('ARROWS / WASD  MOVE     SPACE  SHOOT     P  PAUSE', W / 2, H - 48);

  // Hi score
  ctx.save();
  ctx.shadowBlur = 8; ctx.shadowColor = '#9da5f7';
  ctx.fillStyle = '#9da5f7';
  ctx.font = '10px Silkscreen';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('HI-SCORE: ' + hiScore.toString().padStart(5, '0'), W / 2, H - 26);
  ctx.restore();
}

function drawOverlay(title, col, sub) {
  ctx.fillStyle = 'rgba(0,3,65,0.72)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.save();
  ctx.shadowBlur = 20; ctx.shadowColor = col;
  ctx.fillStyle  = col;
  ctx.font = '26px Silkscreen';
  ctx.fillText(title, W / 2, H / 2 - 16);
  ctx.font = '9px Silkscreen';
  ctx.fillStyle = '#9da5f7'; ctx.shadowBlur = 0;
  ctx.fillText(sub, W / 2, H / 2 + 20);
  ctx.restore();
}

function drawLevelClear(t) {
  ctx.fillStyle = 'rgba(0,3,65,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.save();
  ctx.shadowBlur = 22; ctx.shadowColor = '#70f0f3';
  ctx.fillStyle = '#70f0f3';
  ctx.font = '22px Silkscreen';
  ctx.fillText('SECTOR CLEARED!', W / 2, H / 2 - 50);

  ctx.font = '13px Silkscreen';
  ctx.fillStyle = '#d77eff'; ctx.shadowColor = '#d77eff';
  ctx.fillText('SCORE: ' + score.toString().padStart(5, '0'), W / 2, H / 2 - 8);

  ctx.font = '9px Silkscreen';
  ctx.fillStyle = '#9da5f7'; ctx.shadowBlur = 0;
  ctx.fillText('NEXT: SECTOR ' + (level + 1), W / 2, H / 2 + 20);

  if (Math.floor(t * 1.8) % 2 === 0) {
    ctx.shadowBlur = 10; ctx.shadowColor = '#70f0f3';
    ctx.fillStyle = '#70f0f3';
    ctx.font = '9px Silkscreen';
    ctx.fillText('PRESS SPACE / FIRE TO CONTINUE', W / 2, H / 2 + 52);
  }
  ctx.restore();
}

function drawGameOver(t) {
  ctx.fillStyle = 'rgba(0,3,65,0.75)';
  ctx.fillRect(0, 0, W, H);

  // CRT scanlines
  for (let y = 0; y < H; y += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0, y, W, 2);
  }

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.save();
  ctx.shadowBlur = 24; ctx.shadowColor = '#ff6e84';
  ctx.fillStyle = '#ff6e84';
  ctx.font = '30px Silkscreen';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 70);

  ctx.font = '11px Silkscreen';
  ctx.fillStyle = '#d77eff'; ctx.shadowColor = '#d77eff';
  ctx.fillText('SCORE     ' + score.toString().padStart(5, '0'), W / 2, H / 2 - 20);
  ctx.fillText('HI-SCORE  ' + hiScore.toString().padStart(5, '0'), W / 2, H / 2 + 10);

  if (score >= hiScore && score > 0) {
    ctx.font = '9px Silkscreen';
    ctx.fillStyle = '#70f0f3'; ctx.shadowColor = '#70f0f3';
    ctx.fillText('★ NEW HIGH SCORE! ★', W / 2, H / 2 + 36);
  }

  if (Math.floor(t * 1.8) % 2 === 0) {
    ctx.shadowBlur = 10; ctx.shadowColor = '#9da5f7';
    ctx.fillStyle = '#9da5f7';
    ctx.font = '9px Silkscreen';
    ctx.fillText('PRESS SPACE / FIRE TO RETRY', W / 2, H / 2 + 66);
  }
  ctx.restore();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
updateHUD();
requestAnimationFrame(loop);

})(); // end IIFE
</script>
</body>
