<svg xmlns="http://www.w3.org/2000/svg" width="600" height="338" viewBox="0 0 600 338">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd84d" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd84d" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="338" fill="#0a0028"/>

  <!-- Grid lines -->
  <g stroke="rgba(112,240,243,0.06)" stroke-width="1">
    <line x1="0"   y1="40"  x2="600" y2="40"/>
    <line x1="0"   y1="80"  x2="600" y2="80"/>
    <line x1="0"   y1="120" x2="600" y2="120"/>
    <line x1="0"   y1="160" x2="600" y2="160"/>
    <line x1="0"   y1="200" x2="600" y2="200"/>
    <line x1="0"   y1="240" x2="600" y2="240"/>
    <line x1="40"  y1="0"   x2="40"  y2="338"/>
    <line x1="80"  y1="0"   x2="80"  y2="338"/>
    <line x1="120" y1="0"   x2="120" y2="338"/>
    <line x1="160" y1="0"   x2="160" y2="338"/>
    <line x1="200" y1="0"   x2="200" y2="338"/>
    <line x1="240" y1="0"   x2="240" y2="338"/>
    <line x1="280" y1="0"   x2="280" y2="338"/>
    <line x1="320" y1="0"   x2="320" y2="338"/>
    <line x1="360" y1="0"   x2="360" y2="338"/>
    <line x1="400" y1="0"   x2="400" y2="338"/>
    <line x1="440" y1="0"   x2="440" y2="338"/>
    <line x1="480" y1="0"   x2="480" y2="338"/>
    <line x1="520" y1="0"   x2="520" y2="338"/>
    <line x1="560" y1="0"   x2="560" y2="338"/>
  </g>

  <!-- Ground floor -->
  <rect x="0" y="270" width="600" height="68" fill="#100030"/>

  <!-- Ground glow line -->
  <line x1="0" y1="270" x2="600" y2="270" stroke="#ffd84d" stroke-width="3" filter="url(#blur2)"/>
  <line x1="0" y1="270" x2="600" y2="270" stroke="#ffd84d" stroke-width="1.5"/>

  <!-- Spikes -->
  <polygon points="210,270 224,236 238,270" fill="#ff6e84" filter="url(#blur2)" opacity="0.7"/>
  <polygon points="210,270 224,236 238,270" fill="#ff6e84"/>
  <polygon points="240,270 254,236 268,270" fill="#ff6e84" filter="url(#blur2)" opacity="0.7"/>
  <polygon points="240,270 254,236 268,270" fill="#ff6e84"/>

  <!-- Block obstacle -->
  <rect x="340" y="236" width="34" height="34" fill="#4e378a" filter="url(#blur4)" opacity="0.6"/>
  <rect x="340" y="236" width="34" height="34" fill="#b8a0fb"/>
  <rect x="340" y="236" width="34" height="34" fill="none" stroke="#d77eff" stroke-width="1.5"/>
  <line x1="357" y1="236" x2="357" y2="270" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
  <line x1="340" y1="253" x2="374" y2="253" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>

  <!-- Triple spike -->
  <polygon points="430,270 444,236 458,270" fill="#ff6e84" filter="url(#blur2)" opacity="0.6"/>
  <polygon points="430,270 444,236 458,270" fill="#ff6e84"/>
  <polygon points="460,270 474,236 488,270" fill="#ff6e84" filter="url(#blur2)" opacity="0.6"/>
  <polygon points="460,270 474,236 488,270" fill="#ff6e84"/>
  <polygon points="490,270 504,236 518,270" fill="#ff6e84" filter="url(#blur2)" opacity="0.6"/>
  <polygon points="490,270 504,236 518,270" fill="#ff6e84"/>

  <!-- Player cube — airborne, rotated ~20deg -->
  <g transform="translate(130,200) rotate(20,17,17)">
    <!-- Glow -->
    <rect x="-10" y="-10" width="54" height="54" fill="url(#glow)" filter="url(#blur4)"/>
    <!-- Body -->
    <rect x="0" y="0" width="34" height="34" fill="#ffd84d" filter="url(#blur2)" opacity="0.5"/>
    <rect x="0" y="0" width="34" height="34" fill="#ffd84d"/>
    <!-- Inner diamond -->
    <polygon points="17,4 30,17 17,30 4,17" fill="#ff9900"/>
    <!-- Border -->
    <rect x="0" y="0" width="34" height="34" fill="none" stroke="#ffe066" stroke-width="2"/>
  </g>

  <!-- Trail particles -->
  <circle cx="106" cy="232" r="3" fill="#ffd84d" opacity="0.6"/>
  <circle cx="95"  cy="240" r="2" fill="#ffd84d" opacity="0.4"/>
  <circle cx="84"  cy="248" r="2" fill="#ff9900" opacity="0.3"/>
  <circle cx="74"  cy="255" r="1.5" fill="#ffd84d" opacity="0.2"/>

  <!-- Title text -->
  <text x="300" y="80" text-anchor="middle" font-family="monospace" font-size="42" font-weight="900" fill="#ffd84d" filter="url(#blur4)" opacity="0.6">NEON SURGE</text>
  <text x="300" y="80" text-anchor="middle" font-family="monospace" font-size="42" font-weight="900" fill="#ffd84d">NEON SURGE</text>

  <!-- Subtitle -->
  <text x="300" y="118" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(157,165,247,0.8)" letter-spacing="4">DODGE · JUMP · SURVIVE</text>

  <!-- Music note badge -->
  <rect x="246" y="140" width="108" height="22" fill="rgba(255,216,77,0.12)" rx="0"/>
  <text x="300" y="156" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffd84d" letter-spacing="3">♪ WITH MUSIC</text>

  <!-- Bottom glow -->
  <rect x="0" y="280" width="600" height="58" fill="url(#glow)" opacity="0.3"/>
</svg>
